<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jad Drie Dri Aromin - Personal Web Page</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg1:#6C63FF;
      --bg2:#00C2FF;
      --card: rgba(255,255,255,0.75);
      --text:#111827;
      --muted:#6b7280;
      --shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    body.dark{
      --card: rgba(17,24,39,0.85);
      --text:#f9fafb;
      --muted:#9ca3af;
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    *{
      box-sizing:border-box;
      font-family:system-ui, Arial;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(-45deg, #6C63FF, #00C2FF, #ff6ec4, #7873f5);
      background-size:400% 400%;
      animation: move 10s ease infinite;
    }

    @keyframes move{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .card{
      width:90%;
      max-width:720px;
      padding:32px;
      border-radius:22px;
      background:var(--card);
      backdrop-filter: blur(20px);
      box-shadow:var(--shadow);
      text-align:center;
      transition:0.3s;
    }

    .avatar {
      width:120px;
      height:120px;
      margin:0 auto 12px;
      border-radius:22px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, #6C63FF, #00C2FF);
    }

    .avatar img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    h1{
      margin:10px 0 5px;
      color:var(--text);
    }

    .role{
      color:#6C63FF;
      font-weight:700;
    }

    p{
      color:var(--muted);
      margin:4px 0;
    }

    ul{
      list-style:none;
      padding:0;
      margin-top:14px;
      color:var(--muted);
    }

    ul li{
      margin:6px 0;
    }


    .socials{
      margin-top:15px;
      display:flex;
      justify-content:center;
      gap:14px;
    }

    .socials a{
      text-decoration:none;
      font-size:22px;
      width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:white;
      color:#111827;
      transition:0.2s;
    }

    .socials a:hover{
      transform:translateY(-3px);
    }

    body.dark .socials a{
      background:#1f2937;
      color:#f9fafb;
    }

    .btn{
      margin-top:14px;
      padding:10px 14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:white;
      font-weight:600;
      transition:0.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    body.dark .btn{
      background:#1f2937;
      color:white;
    }

    .top-actions{
      display:flex;
      justify-content:flex-end;
      margin-bottom:10px;
    }

    .small-btn{
      padding:8px 10px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      background:white;
      font-size:12px;
    }

    body.dark .small-btn{
      background:#1f2937;
      color:white;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="top-actions">
      <button class="small-btn" onclick="toggleTheme()">🌙 Theme</button>
    </div>

<div class="avatar">
  <img src="mypic.png" alt="Profile Picture">
</div>

    <h1>Jad Drie Dri D. Aromin</h1>
    <p class="role">Student / Aspiring Developer</p>
    <p>Welcome to my personal webpage!</p>

    <ul>
      <li>📍 Capiz, Philippines</li>
      <li>📧 jaddriedri@gmail.com</li>
      <li>📞 +63 981 493 5874</li>
      <li>💻 HTML • Python • Java Learner</li>
    </ul>

<div class="socials">

  <a href="https://web.facebook.com/Jaddriee" target="_blank" title="Facebook">
    <i class="fa-brands fa-facebook-f"></i>
  </a>

  <a href="https://github.com/Jdaromin" target="_blank" title="GitHub">
    <i class="fa-brands fa-github"></i>
  </a>

  <a href="https://www.instagram.com/jad_drie/" target="_blank" title="Instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>

</div>
  </div>

<script>
  function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
  }

  (function(){
    if(localStorage.getItem("theme") === "dark"){
      document.body.classList.add("dark");
    }
  })();
</script>

</body>
</html>
